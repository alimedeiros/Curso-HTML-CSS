<body>
    <h1>Entendendo a hierarquia</h1>
        <p>Basicamente nessa aula foi explicado que h1, h2, h3 e etc, não significa tamanhos diferentes, significa o nível na hierarquia dos textos, como h1 q é o títilo principal, h2 que é o subtitulo, h3 é o subtitulo do subtitulo e assim sucetivamente até o h6</p>
